<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>iQdrone 360° Industrial Orbit Animation</title>
    <style>
        :root {
            --saffron: #FF9933;
            --bg: #050505;
            --radius: 280px; /* Radius of the orbit */
            --sync-speed: 1.5s; /* Speed of the pulsing light and ray */
        }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- THE FIXED CENTER AXIS --- */
        .hero-center {
            position: relative;
            width: 2px;
            height: 2px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- THE ROTATING ARM (CLOCK HAND) --- */
        .orbit-arm {
            position: absolute;
            width: var(--radius);
            height: 4px;
            transform-origin: left center;
            left: 0; 
            animation: clockRotation 12s infinite linear;
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        @keyframes clockRotation {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* --- THE SYNCED PULSING RAY --- */
        .visual-ray {
            position: absolute;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(to right, var(--saffron), transparent);
            animation: rayPulseSync var(--sync-speed) infinite ease-in-out;
        }

        @keyframes rayPulseSync {
            0%, 100% { opacity: 0.1; box-shadow: 0 0 5px var(--saffron); }
            50% { opacity: 0.8; box-shadow: 0 0 25px var(--saffron); }
        }

        /* --- THE INDUSTRIAL DRONE (Distinct from Cursor) --- */
        .drone-wrapper {
            transform: rotate(90deg); /* Faces Forward in the direction of travel */
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.9));
        }

        .propeller {
            animation: spin 0.15s infinite linear;
            transform-box: fill-box;
            transform-origin: center;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* --- CENTER CONTENT --- */
        .branding {
            position: absolute;
            text-align: center;
            z-index: 10;
        }

        .branding h1 {
            font-size: 4.5rem;
            margin: 0;
            color: var(--saffron);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        .solution-tag {
            letter-spacing: 10px;
            font-size: 0.8rem;
            color: white;
            opacity: 0.8;
            margin-bottom: 5px;
        }

        /* --- THE FOOTER LABELS --- */
        .footer-dimensions {
            position: absolute;
            bottom: 50px;
            display: flex;
            gap: 25px;
        }

        .dim-box {
            padding: 12px 24px;
            background: #111;
            border: 1px solid #333;
            font-size: 0.8rem;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .highlight {
            border: 2px solid var(--saffron);
            color: var(--saffron);
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="hero-center">
        <div class="branding">
            <div class="solution-tag">360° SOLUTION</div>
            <h1>iQdrone</h1>
            <div style="font-weight: 300; letter-spacing: 3px; margin-top: 5px;">PARTNER WITH US</div>
            <div style="font-size: 0.6rem; color: #555; margin-top: 15px; letter-spacing: 5px;">MP | CG | MAHARASHTRA</div>
        </div>

        <div class="orbit-arm">
            <div class="visual-ray"></div>

            <div class="drone-wrapper">
                <svg viewBox="0 0 120 120" width="90" height="90" xmlns="http://www.w3.org/2000/svg">
                    <rect x="52" y="10" width="16" height="100" rx="4" fill="#1a1a1a" stroke="#333" stroke-width="2"/>
                    <rect x="10" y="52" width="100" height="16" rx="4" fill="#1a1a1a" stroke="#333" stroke-width="2"/>
                    
                    <circle cx="20" cy="20" r="12" fill="#111" stroke="#444" stroke-width="2"/>
                    <circle cx="100" cy="20" r="12" fill="#111" stroke="#444" stroke-width="2"/>
                    <circle cx="20" cy="100" r="12" fill="#111" stroke="#444" stroke-width="2"/>
                    <circle cx="100" cy="100" r="12" fill="#111" stroke="#444" stroke-width="2"/>

                    <rect x="35" y="40" width="50" height="40" rx="8" fill="#111" stroke="#FF9933" stroke-width="3"/>
                    
                    <circle cx="60" cy="60" r="5" fill="#FF9933">
                        <animate attributeName="opacity" values="1;0.2;1" dur="1.5s" repeatCount="indefinite" />
                        <animate attributeName="r" values="5;8;5" dur="1.5s" repeatCount="indefinite" />
                    </circle>

                    <g class="propeller">
                        <rect x="0" y="18" width="40" height="5" fill="#eee" opacity="0.7" rx="2"/>
                    </g>
                    <g class="propeller" style="transform: translate(80px, 0px);">
                        <rect x="0" y="18" width="40" height="5" fill="#eee" opacity="0.7" rx="2"/>
                    </g>
                    <g class="propeller" style="transform: translate(0px, 80px);">
                        <rect x="0" y="18" width="40" height="5" fill="#eee" opacity="0.7" rx="2"/>
                    </g>
                    <g class="propeller" style="transform: translate(80px, 80px);">
                        <rect x="0" y="18" width="40" height="5" fill="#eee" opacity="0.7" rx="2"/>
                    </g>
                </svg>
            </div>
        </div>
    </div>

    <div class="footer-dimensions">
        <div class="dim-box">ACADEMY</div>
        <div class="dim-box highlight">WORKSHOP BUSINESS</div>
        <div class="dim-box">SERVICES</div>
        <div class="dim-box">AGRI-SPRAY & RENTAL</div>
    </div>

</body>
</html>
